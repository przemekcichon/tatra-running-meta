<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aura — a privacy-presence UI pattern</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Hanken Grotesk', 'system-ui', 'sans-serif'],
          serif: ['Instrument Serif', 'Georgia', 'serif'],
        },
        colors: {
          ink: '#15151c',
          mist: '#f3f4f8',
          aura: { 500: '#5b5be0', 600: '#4a48c9', 50: '#eeeefc' },
        },
      },
    },
  };
</script>
<style>
  html { -webkit-font-smoothing: antialiased; }
  body { background: #eef0f6; color: #15151c; font-family: 'Hanken Grotesk', sans-serif; }
  .serif { font-family: 'Instrument Serif', Georgia, serif; }
  /* gentle breathing aura behind the orb */
  @keyframes breathe { 0%,100% { transform: scale(1); opacity: .55; } 50% { transform: scale(1.12); opacity: .85; } }
  .breathe { animation: breathe 5.5s ease-in-out infinite; }
  @keyframes spin-slow { to { transform: rotate(360deg); } }
  .spin-slow { animation: spin-slow 26s linear infinite; }
  @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.97); } to { opacity: 1; transform: none; } }
  .pop { animation: pop .22s cubic-bezier(.2,.7,.3,1) both; }
  @media (prefers-reduced-motion: reduce) { .breathe, .spin-slow, .pop { animation: none !important; } }
  .grain { background-image: radial-gradient(rgba(91,91,224,.04) 1px, transparent 1px); background-size: 22px 22px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

/* ============================================================
   GENERATIVE IDENTITY  (the "first-party cookie" persona)
   ============================================================ */
const ADJ = ['Tranquil','Wandering','Curious','Mellow','Velvet','Misty','Gentle','Lucky','Drowsy','Sunny','Quiet','Plucky','Serene','Cosmic','Nimble','Cozy'];
const ANIMAL = ['Marmot','Heron','Lynx','Otter','Capybara','Fox','Tapir','Puffin','Bison','Koala','Hare','Moth','Newt','Crane','Ibex','Vole'];

function rng(seed) {
  let t = (seed + 0x6D2B79F5) >>> 0;
  t = Math.imul(t ^ (t >>> 15), t | 1);
  t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}
function identity(seed) {
  const a = ADJ[Math.floor(rng(seed) * ADJ.length)];
  const an = ANIMAL[Math.floor(rng(seed * 7 + 13) * ANIMAL.length)];
  const tag = Math.floor(rng(seed * 3 + 5) * 0x10000).toString(16).toUpperCase().padStart(4, '0');
  const hue = Math.floor(rng(seed * 11 + 2) * 360);
  return { name: `${a} ${an}`, tag, hue };
}

/* Generative "aura" avatar — soft overlapping fields, deterministic from seed */
function AuraAvatar({ seed, size = 44 }) {
  const { hue } = identity(seed);
  const h2 = (hue + 46) % 360;
  const h3 = (hue + 318) % 360;
  const id = 'clip' + seed;
  return (
    <svg width={size} height={size} viewBox="0 0 48 48" aria-hidden="true">
      <defs>
        <clipPath id={id}><circle cx="24" cy="24" r="24" /></clipPath>
      </defs>
      <g clipPath={`url(#${id})`}>
        <rect width="48" height="48" fill={`hsl(${hue} 52% 90%)`} />
        <circle cx="15" cy="33" r="22" fill={`hsl(${hue} 64% 62%)`} opacity="0.92" />
        <circle cx="36" cy="16" r="17" fill={`hsl(${h2} 66% 60%)`} opacity="0.85" />
        <circle cx="30" cy="38" r="11" fill={`hsl(${h3} 70% 64%)`} opacity="0.8" />
        <circle cx="19" cy="18" r="4.5" fill="#fff" opacity="0.7" />
      </g>
    </svg>
  );
}

/* ============================================================
   THE MARK  (navbar icon) — the "presence orb"
   anonymous: dashed ring (unclaimed) · claimed: solid ring
   ============================================================ */
function AuraMark({ seed, claimed, size = 40, withAvatar = true }) {
  const ring = claimed ? '#15151c' : '#9a9ab0';
  return (
    <span className="relative inline-grid place-items-center" style={{ width: size, height: size }}>
      {withAvatar && (
        <span className="absolute inset-[5px] rounded-full overflow-hidden">
          <AuraAvatar seed={seed} size={size - 10} />
        </span>
      )}
      <svg width={size} height={size} viewBox="0 0 40 40" className={claimed ? '' : 'spin-slow'}>
        <circle cx="20" cy="20" r="18" fill="none" stroke={ring} strokeWidth="2"
          strokeLinecap="round" strokeDasharray={claimed ? 'none' : '2.6 5.2'} opacity={claimed ? 1 : 0.9} />
        {claimed && <circle cx="33.2" cy="9.5" r="3" fill="#22b07d" stroke="#fff" strokeWidth="1.6" />}
      </svg>
    </span>
  );
}

/* Clean monochrome spec version (no avatar) for the icon sheet */
function AuraGlyph({ claimed, size = 30 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="17" stroke="currentColor" strokeWidth="2.2"
        strokeLinecap="round" strokeDasharray={claimed ? 'none' : '2.6 5.4'} />
      <circle cx="20" cy="20" r="7.5" fill="currentColor" />
    </svg>
  );
}

/* ============================================================
   CONTROLS
   ============================================================ */
function Ico({ d, fill }) {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill={fill ? 'currentColor' : 'none'} stroke={fill ? 'none' : 'currentColor'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
}
const ICONS = {
  phone: <path d="M5 4h3l2 5-2 1.5a12 12 0 0 0 5 5L18 13l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2Z" />,
  play: <><circle cx="12" cy="12" r="9" /><path d="M10 8.5l5 3.5-5 3.5Z" fill="currentColor" stroke="none" /></>,
  map: <><path d="M9 4 3 6.5v13L9 17l6 2.5 6-2.5v-13L15 6.5 9 4Z" /><path d="M9 4v13M15 6.5v13" /></>,
  form: <><rect x="4" y="3" width="16" height="18" rx="2" /><path d="M8 8h8M8 12h8M8 16h5" /></>,
  shield: <path d="M12 3l7 3v5c0 5-3.4 8.3-7 10-3.6-1.7-7-5-7-10V6l7-3Z" />,
  dice: <><rect x="4" y="4" width="16" height="16" rx="4" /><circle cx="9" cy="9" r="1.2" fill="currentColor" stroke="none" /><circle cx="15" cy="15" r="1.2" fill="currentColor" stroke="none" /><circle cx="15" cy="9" r="1.2" fill="currentColor" stroke="none" /><circle cx="9" cy="15" r="1.2" fill="currentColor" stroke="none" /></>,
};

const ROWS = [
  { key: 'phone', icon: 'phone', title: 'Phone numbers', priv: { v: 'dialer', label: 'Dialer' }, conv: { v: 'whatsapp', label: 'WhatsApp' }, note: 'Where a tapped number takes you.' },
  { key: 'youtube', icon: 'play', title: 'YouTube videos', priv: { v: 'thumb', label: 'Thumbnail' }, conv: { v: 'play', label: 'Play here' }, note: 'Thumbnail loads nothing from YouTube until you ask.' },
  { key: 'maps', icon: 'map', title: 'Maps', priv: { v: 'link', label: 'Plain link' }, conv: { v: 'embed', label: 'Embed' }, note: 'A link sends no referrer; an embed loads Google.' },
  { key: 'forms', icon: 'form', title: 'HubSpot forms', priv: { v: 'light', label: 'Lightweight' }, conv: { v: 'full', label: 'Full' }, note: 'Lightweight posts the same data, no third-party JS.' },
];

const PRESETS = {
  smooth:   { phone: 'whatsapp', youtube: 'play',  maps: 'embed', forms: 'full' },
  balanced: { phone: 'whatsapp', youtube: 'thumb', maps: 'link',  forms: 'light' },
  private:  { phone: 'dialer',   youtube: 'thumb', maps: 'link',  forms: 'light' },
};
const PRESET_META = [
  { id: 'smooth', label: 'Smooth ride', sub: 'Everything on' },
  { id: 'balanced', label: 'Balanced', sub: 'Smart default' },
  { id: 'private', label: 'Sanctuary', sub: 'Nothing extra' },
];

function Segment({ row, value, onChange }) {
  const opts = [row.priv, row.conv];
  return (
    <div className="flex gap-1 p-1 rounded-xl bg-mist border border-black/5">
      {opts.map((o, i) => {
        const on = value === o.v;
        return (
          <button key={o.v} onClick={() => onChange(o.v)}
            className={'flex-1 text-[13px] font-semibold rounded-lg py-2 px-2 transition-all ' +
              (on ? 'bg-ink text-white shadow-sm' : 'text-black/45 hover:text-ink')}>
            <span className="inline-flex items-center gap-1.5 justify-center">
              {i === 0 && on && <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><path d="M12 3l7 3v5c0 5-3.4 8.3-7 10-3.6-1.7-7-5-7-10V6l7-3Z"/></svg>}
              {o.label}
            </span>
          </button>
        );
      })}
    </div>
  );
}

/* ============================================================
   THE PANEL
   ============================================================ */
function AuraPanel({ seed, claimed, onClaim, onSignout, prefs, setPrefs, onRegen }) {
  const me = identity(seed);
  const activePreset = useMemo(() => {
    for (const id of Object.keys(PRESETS)) {
      if (ROWS.every((r) => PRESETS[id][r.key] === prefs[r.key])) return id;
    }
    return null;
  }, [prefs]);

  return (
    <div className="pop w-[360px] max-w-[92vw] rounded-3xl bg-white shadow-[0_40px_90px_-30px_rgba(20,20,40,.5)] border border-black/[.06] overflow-hidden">
      {/* identity header */}
      <div className="relative px-5 pt-5 pb-4 overflow-hidden">
        <div className="absolute -top-10 -right-8 w-40 h-40 rounded-full breathe"
          style={{ background: `radial-gradient(circle, hsl(${me.hue} 80% 70% / .5), transparent 70%)` }} />
        <div className="relative flex items-center gap-3.5">
          <div className="relative shrink-0">
            <AuraMark seed={seed} claimed={claimed} size={52} />
          </div>
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-2">
              <h3 className="font-bold text-[16px] truncate">{me.name}</h3>
              <span className="text-[10px] font-mono font-semibold tracking-wider text-aura-600 bg-aura-50 rounded px-1.5 py-0.5">#{me.tag}</span>
            </div>
            <p className="text-[12.5px] text-black/45 mt-0.5">
              {claimed ? 'Signed in · synced to your account' : 'Anonymous · first-party cookie only'}
            </p>
          </div>
          {!claimed && (
            <button onClick={onRegen} title="New identity"
              className="shrink-0 w-9 h-9 grid place-items-center rounded-full border border-black/10 text-black/50 hover:text-ink hover:border-ink transition-colors">
              <Ico d={ICONS.dice} />
            </button>
          )}
        </div>
        <p className="relative text-[12.5px] leading-relaxed text-black/55 mt-3 flex gap-2">
          <span className="text-emerald-600 mt-0.5 shrink-0"><Ico d={ICONS.shield} /></span>
          We gave you a face on purpose — so you can see you exist here, on your terms. Nothing leaves your browser without a tap.
        </p>
      </div>

      {/* presets */}
      <div className="px-5">
        <div className="grid grid-cols-3 gap-2">
          {PRESET_META.map((p) => {
            const on = activePreset === p.id;
            return (
              <button key={p.id} onClick={() => setPrefs({ ...PRESETS[p.id] })}
                className={'rounded-2xl px-2 py-2.5 text-center border transition-all ' +
                  (on ? 'border-aura-500 bg-aura-50 ring-1 ring-aura-500/30' : 'border-black/10 hover:border-black/25 bg-white')}>
                <div className={'text-[13px] font-bold ' + (on ? 'text-aura-600' : 'text-ink')}>{p.label}</div>
                <div className="text-[10.5px] text-black/45 mt-0.5">{p.sub}</div>
              </button>
            );
          })}
        </div>
        <p className="text-[11.5px] text-black/40 text-center mt-2">Don't want to decide? <b className="text-black/60">Balanced</b> is already on.</p>
      </div>

      {/* toggles */}
      <div className="px-5 py-4 mt-1 space-y-3.5">
        {ROWS.map((r) => (
          <div key={r.key}>
            <div className="flex items-center gap-2.5 mb-1.5">
              <span className="w-8 h-8 grid place-items-center rounded-lg bg-mist border border-black/5 text-ink shrink-0">
                <Ico d={ICONS[r.icon]} />
              </span>
              <div className="min-w-0">
                <div className="text-[14px] font-bold leading-tight">{r.title}</div>
                <div className="text-[11.5px] text-black/45 leading-tight">{r.note}</div>
              </div>
            </div>
            <Segment row={r} value={prefs[r.key]} onChange={(v) => setPrefs({ ...prefs, [r.key]: v })} />
          </div>
        ))}
      </div>

      {/* footer */}
      <div className="px-5 py-4 bg-mist/70 border-t border-black/[.06]">
        {claimed ? (
          <button onClick={onSignout}
            className="w-full rounded-xl py-3 text-[14px] font-bold text-black/55 hover:text-ink border border-black/10 hover:border-ink/30 transition-colors">
            Sign out — keep my Aura anonymous
          </button>
        ) : (
          <button onClick={onClaim}
            className="group w-full rounded-xl py-3 text-[14px] font-bold text-white bg-ink hover:bg-black transition-colors flex items-center justify-center gap-2">
            Claim this identity
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="group-hover:translate-x-0.5 transition-transform"><line x1="4" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
          </button>
        )}
        <p className="text-[11px] text-black/40 text-center mt-2">Your settings carry over — anonymous today, you tomorrow.</p>
      </div>
    </div>
  );
}

/* ============================================================
   DEMO NAVBAR + PAGE
   ============================================================ */
function NavDemo() {
  const [seed, setSeed] = useState(() => Math.floor(Math.random() * 1e9));
  const [open, setOpen] = useState(false);
  const [claimed, setClaimed] = useState(false);
  const [prefs, setPrefs] = useState({ ...PRESETS.balanced });
  const wrap = useRef(null);
  const me = identity(seed);

  useEffect(() => {
    const onDoc = (e) => { if (wrap.current && !wrap.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onKey);
    return () => { document.removeEventListener('mousedown', onDoc); document.removeEventListener('keydown', onKey); };
  }, []);

  return (
    <div className="rounded-[26px] bg-white border border-black/[.07] shadow-[0_30px_70px_-40px_rgba(20,20,40,.5)]">
      {/* browser chrome */}
      <div className="flex items-center gap-2 px-4 h-10 bg-mist border-b border-black/5 rounded-t-[26px]">
        <span className="w-3 h-3 rounded-full bg-[#febc2e]" />
        <span className="w-3 h-3 rounded-full bg-[#28c840]" />
        <span className="w-3 h-3 rounded-full bg-[#ff5f57]" />
        <div className="ml-3 flex-1 max-w-sm h-5 rounded-md bg-white border border-black/5 text-[11px] text-black/35 flex items-center px-2 font-mono">yoursite.com</div>
      </div>

      {/* navbar */}
      <div className="relative grain">
        <nav className="flex items-center justify-between px-6 h-[68px] border-b border-black/[.06]">
          <div className="flex items-center gap-2.5">
            <div className="w-7 h-7 rounded-lg bg-ink grid place-items-center text-white text-[13px] font-black">N</div>
            <span className="font-bold text-[17px] tracking-tight">Northwind</span>
          </div>
          <div className="hidden md:flex items-center gap-7 text-[14.5px] font-semibold text-black/55">
            <span className="hover:text-ink cursor-pointer transition-colors">Work</span>
            <span className="hover:text-ink cursor-pointer transition-colors">Studio</span>
            <span className="hover:text-ink cursor-pointer transition-colors">Journal</span>
            <span className="hover:text-ink cursor-pointer transition-colors">Contact</span>
          </div>

          <div className="flex items-center gap-3" ref={wrap}>
            <div className="relative">
              <button onClick={() => setOpen((v) => !v)}
                aria-label="Open your Aura" aria-expanded={open}
                className="relative rounded-full p-0.5 hover:scale-105 active:scale-95 transition-transform">
                <span className="absolute inset-0 rounded-full breathe -z-0"
                  style={{ background: `radial-gradient(circle, hsl(${me.hue} 85% 68% / .55), transparent 68%)` }} />
                <span className="relative block"><AuraMark seed={seed} claimed={claimed} size={42} /></span>
              </button>

              {open && (
                <div className="absolute right-0 top-[calc(100%+14px)] z-20">
                  <AuraPanel
                    seed={seed} claimed={claimed} prefs={prefs} setPrefs={setPrefs}
                    onClaim={() => setClaimed(true)}
                    onSignout={() => setClaimed(false)}
                    onRegen={() => setSeed(Math.floor(Math.random() * 1e9))}
                  />
                </div>
              )}
            </div>
          </div>
        </nav>

        {/* faux page body */}
        <div className="px-6 py-12 md:py-16 text-center grain rounded-b-[26px]">
          <div className="text-[12px] font-bold tracking-[0.2em] text-aura-600 uppercase">Independent design studio</div>
          <h2 className="serif text-[44px] md:text-[60px] leading-[1.02] mt-3 max-w-2xl mx-auto">Build calmly. Ship things that last.</h2>
          <p className="text-black/50 text-[16px] mt-4 max-w-md mx-auto">A demo page. The orb up there is your <b className="text-ink">Aura</b> — open it to set the rules before you ever sign up.</p>
          <div className="mt-7 inline-flex items-center gap-2 text-[13px] font-semibold text-aura-600 bg-aura-50 rounded-full px-4 py-2">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 11V8a5 5 0 0 1 10 0v3"/><rect x="5" y="11" width="14" height="9" rx="2"/></svg>
            Try it → tap the orb, top-right
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   STORY PAGE
   ============================================================ */
function StateCard({ claimed, title, body }) {
  return (
    <div className="flex-1 rounded-2xl bg-white border border-black/[.07] p-5">
      <div className="flex items-center gap-4">
        <div className="text-ink"><AuraGlyph claimed={claimed} size={34} /></div>
        <div className="w-px h-9 bg-black/10" />
        <AuraMark seed={claimed ? 7 : 31} claimed={claimed} size={40} />
      </div>
      <div className="mt-4 text-[14.5px] font-bold">{title}</div>
      <p className="text-[13px] text-black/50 leading-relaxed mt-1">{body}</p>
    </div>
  );
}

function App() {
  return (
    <div className="min-h-screen">
      <div className="max-w-[1080px] mx-auto px-5 md:px-8 py-12 md:py-20">

        {/* hero */}
        <header className="text-center max-w-2xl mx-auto">
          <div className="inline-flex items-center gap-2 text-[12px] font-bold tracking-[0.18em] uppercase text-black/40">
            <span className="w-6 h-px bg-black/25" /> UI Pattern Proposal <span className="w-6 h-px bg-black/25" />
          </div>
          <h1 className="serif text-[78px] md:text-[112px] leading-[0.9] mt-4">Aura</h1>
          <p className="text-[19px] md:text-[21px] text-black/60 mt-2 serif italic">Your presence, your rules.</p>
          <p className="text-[15.5px] text-black/55 leading-relaxed mt-6 max-w-xl mx-auto">
            A navbar orb that gives every anonymous visitor a face and a name the moment they arrive —
            then hands them the controls. It's the calm middle ground between a cookie banner and a login wall:
            a <b className="text-ink">digital sanctuary</b> where the visitor sets the terms, and sensible
            defaults mean they never have to.
          </p>
        </header>

        {/* live demo */}
        <section className="mt-14">
          <NavDemo />
        </section>

        {/* the mark */}
        <section className="mt-16 grid md:grid-cols-[0.9fr_1.1fr] gap-8 items-start">
          <div>
            <h2 className="serif text-[34px] leading-tight">The mark</h2>
            <p className="text-[14.5px] text-black/55 leading-relaxed mt-3">
              Not a silhouette of a stranger — a <b className="text-ink">presence orb</b>. A ring of personal space
              wrapped around a generative avatar. The ring is the visitor's control zone; the core is their identity.
            </p>
            <ul className="mt-4 space-y-2.5 text-[14px] text-black/65">
              <li className="flex gap-2.5"><b className="text-ink shrink-0">Anonymous</b> — the ring is dashed and slowly turns: a presence that exists but isn't claimed yet.</li>
              <li className="flex gap-2.5"><b className="text-ink shrink-0">Claimed</b> — sign up and the ring closes into a solid band with a verified dot. Same orb, now yours.</li>
            </ul>
          </div>
          <div className="flex flex-col sm:flex-row gap-4">
            <StateCard claimed={false} title="Anonymous presence" body="A first-party cookie assigns a face + nickname. Transparent tracking with a friendly body — you can literally see yourself." />
            <StateCard claimed={true} title="Claimed identity" body="The ring seals. Preferences set while anonymous carry straight into the account — no reset, no re-asking." />
          </div>
        </section>

        {/* why it works */}
        <section className="mt-16">
          <h2 className="serif text-[34px] leading-tight text-center">Why the name lands</h2>
          <div className="grid sm:grid-cols-3 gap-4 mt-6">
            {[
              ['Presence', 'An aura is something you have before you say a word — exactly like the anonymous visitor who already “exists” on the page.'],
              ['Peace', 'Soft, ambient, personal. It frames privacy as calm and ownership, not as a scary compliance checkbox.'],
              ['Continuity', 'An aura doesn\u2019t switch off when you log in — it just gets a name. The pattern carries from anonymous to registered seamlessly.'],
            ].map(([t, b]) => (
              <div key={t} className="rounded-2xl bg-white border border-black/[.07] p-5">
                <div className="text-aura-600"><AuraGlyph claimed size={26} /></div>
                <div className="text-[15px] font-bold mt-3">{t}</div>
                <p className="text-[13px] text-black/55 leading-relaxed mt-1.5">{b}</p>
              </div>
            ))}
          </div>
        </section>

        <footer className="mt-16 text-center text-[12.5px] text-black/35">
          Aura · a privacy-presence pattern · concept &amp; mockup
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
